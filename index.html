<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý ôn thi TN THPT môn Tin học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Typography System */
        body { font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.6; color: #334155; }
        
        /* Markdown Content Styling - Textbook Style */
        .markdown-content { font-size: 1rem; line-height: 1.8; color: #1e293b; }
        
        /* Headings */
        .markdown-content h1 { 
            @apply text-3xl font-extrabold text-blue-900 mb-6 pb-4 border-b-2 border-blue-100 mt-4; 
        }
        
        .markdown-content h2 { 
            @apply text-2xl font-bold text-indigo-800 mt-8 mb-4 flex items-center; 
        }
        
        .markdown-content h3 { 
            @apply text-xl font-bold text-blue-700 mt-6 mb-3; 
        }

        /* Clean up standard bold text in headers if AI adds them */
        .markdown-content h1 strong,
        .markdown-content h2 strong,
        .markdown-content h3 strong {
            font-weight: inherit;
            color: inherit;
        }
        
        /* Paragraphs */
        .markdown-content p { 
            @apply mb-4 text-justify; 
        }
        
        /* Lists */
        .markdown-content ul { 
            @apply list-none mb-6 space-y-2 pl-2; 
        }
        
        .markdown-content ul li {
            @apply relative pl-6;
        }
        
        .markdown-content ul li::before {
            content: "•";
            @apply absolute left-0 text-blue-500 font-bold text-lg -top-0.5;
        }

        /* Force new lines for list items that strictly start with - in raw text */
        .markdown-content li {
             display: block;
             margin-bottom: 0.5rem;
        }

        .markdown-content ol { 
            @apply list-decimal pl-6 mb-6 space-y-2 font-medium text-gray-800 marker:text-blue-600 marker:font-bold; 
        }
        
        /* Emphasized text */
        .markdown-content strong {
            @apply font-bold text-indigo-900;
        }
        
        /* Code */
        .markdown-content code { 
            @apply bg-slate-100 px-1.5 py-0.5 rounded text-pink-600 font-mono text-sm border border-slate-200; 
        }

        /* Blockquotes */
        .markdown-content blockquote {
            @apply border-l-4 border-blue-300 pl-4 py-2 italic text-slate-600 bg-blue-50/50 my-6 rounded-r-lg;
        }

        /* Tables */
        .markdown-content table {
            @apply min-w-full divide-y divide-gray-200 border border-gray-200 mb-6 rounded-lg overflow-hidden;
        }
        .markdown-content th {
            @apply px-4 py-3 bg-slate-50 text-left text-xs font-bold text-slate-500 uppercase tracking-wider border-b;
        }
        .markdown-content td {
            @apply px-4 py-3 text-sm text-slate-600 border-t border-slate-100 bg-white;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="bg-[#f8fafc] text-[#334155] antialiased selection:bg-blue-100 selection:text-blue-900">
    <div id="root"></div>
</body>
</html>
